summary: "Pure systemd user-unit renderer for the gateway and orchestrator services. Both units declare on-failure restart with RestartSec, the orchestrator orders After and Wants the gateway, and hardening directives are present. Rendered deploy/systemd files byte-match both the renderer output and the canonical config templates. No embedded secrets; secrets referenced only via TALISMAN_HOME and %h paths. Module is stdlib-only, deterministic, free of filesystem/subprocess/systemctl side effects. No findings."
checks:
