lead_response:
  status: accepted
  summary: >
    Passed on the third pass after two BLOCKs (both failed security checks) on this safety-critical
    approval channel; Codex caught four real security issues, all fixed.
  round_1_fixed:
    - "R1 (blocker): stale-update replay — the offset started at 0, so a pre-gate APPROVE could resolve a
      new gate. Fixed: drain all pending updates before posting; only a post-gate reply counts. Test added."
    - "R2 (high): cross-chat acceptance — inbound decisions were taken from any chat. Fixed: a reply must
      come from the configured operator chat_id. Test added."
    - "R3 (medium): ambiguous vocabulary — yes/ok/y/no/deny widened the approval surface. Narrowed to the
      exact APPROVE/REJECT commands. Test added."
  round_2_fixed:
    - "R1 (blocker, security): the bot token lives in the request URL and httpx error messages include the
      URL, so a Telegram failure could carry bot<TOKEN> into logs / incident dumps. Fixed: all requests go
      through a _request wrapper that scrubs the token and suppresses the token-bearing exception
      (TelegramTransportError), plus a Telegram-token pattern added to redact_secrets (defense in depth at
      the dump). A regression test proves a failing getUpdates does not surface the token."
  note: >
    AT-05 stays COMPONENT_VERIFIED (the live channel with a real token is operator-verified, not CI).