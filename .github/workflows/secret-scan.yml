name: secret-scan

# Defense-in-depth: fail the build if a secret OR operator PII is committed. Two layers:
#   1) Full-history credential scan with gitleaks DEFAULT rules (the original backstop).
#   2) Incremental scan with PROJECT rules (.gitleaks.toml = defaults + PII patterns) over
#      only the commits this PR/push adds, so newly-introduced emails / absolute home paths
#      are caught without re-flagging history that was already redacted.
# Local pre-commit + .gitignore remain the first line of defense; this is the backstop.
#
# Supply-chain posture: checkout is SHA-pinned and the gitleaks binary is checksum-verified
# before use (it is the one tool whose integrity matters most — a trojaned scanner could
# exit 0 and silently disable the backstop).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.18.4"
  GITLEAKS_SHA256: "ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks (checksum-verified)
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}" \
            -o "$tarball"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Full-history credential scan (gitleaks default rules)
        run: gitleaks detect --no-banner --redact --verbose

      - name: Incremental PII + secret scan (project rules) on new commits
        run: |
          set -euo pipefail
          zero="0000000000000000000000000000000000000000"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "$zero" ]; then
            range="${{ github.event.before }}..${{ github.sha }}"
          else
            # No prior ref to diff against (first push / manual dispatch): scan latest commit.
            range="${{ github.sha }}~1..${{ github.sha }}"
          fi
          echo "Scanning commit range with project rules: $range"
          gitleaks detect --no-banner --redact --verbose \
            --config .gitleaks.toml --log-opts="$range"
