name: secret-scan

# Defense-in-depth: fail the build if a secret is committed. Runs gitleaks directly
# (no marketplace-action licensing requirement). Local pre-commit + .gitignore are
# the first line of defense; this is the backstop.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repository
        run: gitleaks detect --no-banner --redact --verbose
