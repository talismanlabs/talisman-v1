name: checks

# Deterministic-check gate. Mirrors ./scripts/checks.sh exactly so "what CI runs"
# and "what I run locally" are identical. Set this job as a required status check
# in branch protection on main.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dev toolchain (into the venv created by setup-uv)
        run: uv pip install -e ".[dev]"

      - name: Run deterministic checks (ruff, ruff-format, mypy, pytest, lint-imports)
        run: ./scripts/checks.sh
