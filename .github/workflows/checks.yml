name: checks

# Deterministic-check gate. Mirrors ./scripts/checks.sh exactly so "what CI runs"
# and "what I run locally" are identical. Set this job as a required status check
# in branch protection on main.
#
# Supply-chain posture: third-party actions are pinned to full commit SHAs (tags are
# mutable), uv is version-pinned, and the toolchain is installed from the committed
# uv.lock via `uv sync --locked` so every run resolves the exact same, reviewed versions.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv (pinned)
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.10.10"
          python-version: "3.12"
          enable-cache: true

      - name: Sync the locked toolchain into .venv
        run: uv sync --locked --extra dev

      - name: Run deterministic checks (ruff, ruff-format, mypy, pytest, lint-imports)
        run: ./scripts/checks.sh
