# Fast, reliable local guardrails.
#
# The AUTHORITATIVE deterministic-check gate is scripts/checks.sh (also run in CI
# by .github/workflows/checks.yml), which additionally runs mypy and lint-imports
# with the correct PYTHONPATH. Pre-commit is kept lean so it stays reliable; it is
# a convenience, not the source of truth.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
